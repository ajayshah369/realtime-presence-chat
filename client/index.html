<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Realtime Presence & Chat</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 640px;
        margin: 40px auto;
        padding: 0 16px;
      }
      #log {
        border: 1px solid #ccc;
        height: 300px;
        overflow-y: auto;
        padding: 8px;
        margin: 8px 0;
        border-radius: 6px;
      }
      .msg {
        margin-bottom: 6px;
      }
      .msg .user {
        font-weight: 600;
      }
      .msg .time {
        color: #999;
        font-size: 0.8em;
        margin-left: 6px;
      }
      #status {
        font-size: 0.85em;
        color: #666;
      }
      input {
        padding: 6px;
        margin: 2px 0;
      }
      button {
        padding: 6px 14px;
      }
      .row {
        display: flex;
        gap: 6px;
        margin-bottom: 6px;
      }
    </style>
  </head>
  <body>
    <h1>Realtime Presence & Chat</h1>
    <p id="status">Not connected</p>

    <div class="row">
      <input id="username" placeholder="username" />
      <input
        id="wsUrl"
        placeholder="wss://xxxx.execute-api.<region>.amazonaws.com/prod"
        style="flex: 1"
      />
      <button id="connectBtn">Connect</button>
    </div>

    <div id="log"></div>

    <div class="row">
      <input
        id="msgInput"
        placeholder="Type a message"
        style="flex: 1"
        disabled
      />
      <button id="sendBtn" disabled>Send</button>
    </div>

    <script>
      let socket;
      const statusEl = document.getElementById("status");
      const logEl = document.getElementById("log");
      const msgInput = document.getElementById("msgInput");
      const sendBtn = document.getElementById("sendBtn");

      document.getElementById("connectBtn").addEventListener("click", () => {
        const username = document.getElementById("username").value || "guest";
        const baseUrl = document.getElementById("wsUrl").value.trim();
        if (!baseUrl) return alert("Paste your WebSocketURL first.");

        socket = new WebSocket(
          `${baseUrl}?username=${encodeURIComponent(username)}`,
        );

        socket.addEventListener("open", () => {
          statusEl.textContent = `Connected as ${username}`;
          msgInput.disabled = false;
          sendBtn.disabled = false;
        });

        socket.addEventListener("message", (event) => {
          appendMessage(JSON.parse(event.data));
        });

        socket.addEventListener("close", () => {
          statusEl.textContent = "Disconnected";
          msgInput.disabled = true;
          sendBtn.disabled = true;
        });
      });

      sendBtn.addEventListener("click", sendMessage);
      msgInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      function sendMessage() {
        const text = msgInput.value.trim();
        if (!text || !socket || socket.readyState !== WebSocket.OPEN) return;
        socket.send(JSON.stringify({ action: "sendMessage", text }));
        msgInput.value = "";
      }

      function appendMessage(data) {
        const div = document.createElement("div");
        div.className = "msg";
        const time = data.timestamp
          ? new Date(data.timestamp).toLocaleTimeString()
          : "";
        div.innerHTML = `<span class="user">${escapeHtml(data.username || "system")}:</span> ${escapeHtml(data.text || data.message || "")} <span class="time">${time}</span>`;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
      }

      function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }
    </script>
  </body>
</html>
